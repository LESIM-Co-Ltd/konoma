name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    # konoma targets macOS on Apple Silicon; macos-14 runners are arm64.
    name: fmt / clippy / test (macOS Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      # Default features include `git`. Warnings are denied (the project's DoD is zero warnings).
      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: Test (default features)
        run: cargo test

      - name: Test (no default features)
        run: cargo test --no-default-features

  # Full clippy + test suite on Linux (x86_64). konoma is cross-platform Unix code, so the same
  # bar applies here. The suite uses a headless test backend, so no terminal/display is needed; the
  # one live-OS-trash test is macOS-gated (freedesktop trash is environment-dependent on Linux).
  check-linux:
    name: clippy / test (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-check

      # System libraries for the C-backed dependencies (libgit2 / arboard / trash).
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config cmake \
            libssl-dev libssh2-1-dev zlib1g-dev \
            libdbus-1-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: Test (default features)
        run: cargo test

      - name: Test (no default features)
        run: cargo test --no-default-features

  # Cross-compile check for macOS x86_64 (the arm64 host covers aarch64 above; Linux is fully
  # covered by check-linux). Windows (x86_64-pc-windows-msvc) is intentionally excluded: konoma
  # uses Unix-only std APIs (PermissionsExt::mode, std::os::unix::fs::symlink, OsStrExt::from_bytes)
  # and Windows terminals do not implement the kitty graphics protocol the previews depend on.
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: x86_64-apple-darwin }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (default features = git)
        run: cargo build --locked --target ${{ matrix.target }}

      - name: Build (no default features)
        run: cargo build --locked --no-default-features --target ${{ matrix.target }}
