name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    # konoma targets macOS on Apple Silicon; macos-14 runners are arm64.
    name: fmt / clippy / test (macOS Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      # Default features include `git`. Warnings are denied (the project's DoD is zero warnings).
      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: Test (default features)
        run: cargo test

      - name: Test (no default features)
        run: cargo test --no-default-features

  # Verify konoma compiles and links on Linux and Windows in addition to macOS.
  # This only checks buildability (not runtime behaviour): the image / PDF / video
  # previews need a kitty-graphics-capable terminal, which is out of scope here.
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: macos-14, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          # Windows (x86_64-pc-windows-msvc) is intentionally excluded: konoma uses
          # Unix-only std APIs (PermissionsExt::mode, std::os::unix::fs::symlink,
          # OsStrExt::from_bytes) and Windows terminals do not implement the kitty
          # graphics protocol the previews depend on.
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux system libraries for the C-backed dependencies:
      #   - libgit2 (git2): OpenSSL + libssh2 + zlib + pkg-config (+ cmake to be safe)
      #   - arboard (clipboard): libxcb
      #   - trash: libdbus
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config cmake \
            libssl-dev libssh2-1-dev zlib1g-dev \
            libdbus-1-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Build (default features = git)
        run: cargo build --locked --target ${{ matrix.target }}

      - name: Build (no default features)
        run: cargo build --locked --no-default-features --target ${{ matrix.target }}
